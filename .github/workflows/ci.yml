name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - 'apps/docs/**'
      - '**/*.md'
      - '.github/workflows/docs.yml'
      - '.github/workflows/homebrew.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        node-version: ${{ github.ref == 'refs/heads/main' && fromJSON('[22, 24]') || fromJSON('[24]') }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test -- --coverage
      - name: Test CLI binary
        run: node packages/tiime-cli/dist/cli.js version

      - name: Coverage comment on PR
        if: github.event_name == 'pull_request' && matrix.node-version == 24
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const body = execSync(
              'node .github/scripts/coverage-comment.js packages/tiime-sdk/coverage/coverage-summary.json packages/tiime-cli/coverage/coverage-summary.json'
            ).toString();

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('<!-- coverage-report-comment -->'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Compute coverage percentage
        id: coverage-pct
        if: github.ref == 'refs/heads/main' && matrix.node-version == 24
        run: |
          SDK=$(node -e "const c=require('./packages/tiime-sdk/coverage/coverage-summary.json');console.log(c.total.statements.pct)")
          CLI=$(node -e "const c=require('./packages/tiime-cli/coverage/coverage-summary.json');console.log(c.total.statements.pct)")
          TOTAL=$(node -e "console.log(Math.round(($SDK+$CLI)/2))")
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "sdk=$SDK" >> $GITHUB_OUTPUT
          echo "cli=$CLI" >> $GITHUB_OUTPUT

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && matrix.node-version == 24
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: tiime-coverage.json
          label: coverage
          message: ${{ steps.coverage-pct.outputs.total }}%
          valColorRange: ${{ steps.coverage-pct.outputs.total }}
          minColorRange: 0
          maxColorRange: 100

  release:
    if: github.ref == 'refs/heads/main'
    needs: [lint, check]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm run release
          version: pnpm changeset version
          title: 'chore: release'
          commit: 'chore: release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
